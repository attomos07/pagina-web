<button class="mobile-menu-btn" id="mobileMenuBtn">
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </button>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <nav class="sidebar-container" id="sidebar">

        <a href="/admin/database-admin" class="icon-button active" data-page="database-admin">
            <svg viewBox="0 0 24 24">
                <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
            </svg>
            <span class="tooltip">Empresas</span>
        </a>

        <div class="divider"></div>

        <button class="icon-button logout-button" id="logoutBtn">
            <svg viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" x2="9" y1="12" y2="12"></line>
            </svg>
            <span class="tooltip">Cerrar Sesión</span>
        </button>

    </nav>

    <script>
        const sidebar   = document.getElementById('sidebar');
        const menuBtn   = document.getElementById('mobileMenuBtn');
        const overlay   = document.getElementById('mobileOverlay');

        menuBtn.addEventListener('click', () => {
            const open = sidebar.classList.toggle('mobile-active');
            overlay.classList.toggle('active', open);
            menuBtn.classList.toggle('active', open);
            document.body.style.overflow = open ? 'hidden' : '';
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('mobile-active');
            overlay.classList.remove('active');
            menuBtn.classList.remove('active');
            document.body.style.overflow = '';
        });

        window.addEventListener('resize', () => {
            if (window.innerWidth > 768) {
                sidebar.classList.remove('mobile-active');
                overlay.classList.remove('active');
                menuBtn.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await fetch('/admin/api/logout', { method: 'POST', credentials: 'include' });
            } finally {
                window.location.href = '/admin/login';
            }
        });
    </script>
