{{define "admin-prospects"}}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attomos Admin — Prospectos</title>
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/static/css/admin/admin-sidebar.css"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #ffffff;
            --surface: #f8fafc;
            --panel:   #ffffff;
            --ink:     #1a1a1a;
            --ink2:    #374151;
            --muted:   #6b7280;
            --border:  #e5e7eb;
            --accent:  #06b6d4;
            --accent2: #0891b2;
            --green:   #10b981;
            --amber:   #f59e0b;
            --red:     #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardRise {
            0%   { opacity: 0; transform: translateY(50px) scale(0.95); }
            50%  { opacity: 1; }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Main layout ── */
        .main {
            margin-left: 96px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* ── Topbar ── */
        .topbar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--ink);
            letter-spacing: -0.5px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(6,182,212,0.08);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        /* ── Content ── */
        .content {
            padding: 32px;
            flex: 1;
        }

        /* ── Stats row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--panel);
            border-radius: 24px;
            padding: 24px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            animation: cardRise 0.8s cubic-bezier(0.16,1,0.3,1) both;
            cursor: pointer;
        }

        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.15s; }
        .stat-card:nth-child(3) { animation-delay: 0.25s; }
        .stat-card:nth-child(4) { animation-delay: 0.35s; }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(6,182,212,0.15);
            border-color: rgba(6,182,212,0.2);
        }

        .stat-card.filter-active {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(6,182,212,0.2);
        }

        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .stat-icon.cyan  { background: linear-gradient(135deg,rgba(6,182,212,0.1),rgba(6,182,212,0.2)); color: var(--accent); }
        .stat-icon.green { background: linear-gradient(135deg,rgba(16,185,129,0.1),rgba(16,185,129,0.2)); color: var(--green); }
        .stat-icon.amber { background: linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.2)); color: var(--amber); }
        .stat-icon.red   { background: linear-gradient(135deg,rgba(239,68,68,0.1),rgba(239,68,68,0.2)); color: var(--red); }

        .stat-value {
            font-size: 30px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
            margin-top: 2px;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s;
            width: 260px;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
        }

        .search-box svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }

        .search-box input {
            border: none; outline: none; background: none;
            font-size: 14px; color: var(--ink); width: 100%;
        }

        .search-box input::placeholder { color: var(--muted); }

        .filter-select {
            padding: 10px 14px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            color: var(--ink);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-select:focus { border-color: var(--accent); }

        .btn-primary {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(6,182,212,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(6,182,212,0.4);
        }

        .btn-primary svg { width: 16px; height: 16px; }

        /* ── Table ── */
        .table-wrap {
            background: var(--panel);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow: hidden;
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease both;
            animation-delay: 0.4s;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: var(--surface);
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(6,182,212,0.03);
        }

        tbody tr:not(:last-child) td {
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 16px 20px;
            font-size: 14px;
            color: var(--ink2);
            vertical-align: middle;
        }

        /* ── Status badge ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
        }

        .status-badge.aceptado  { background: rgba(16,185,129,0.1); color: var(--green); }
        .status-badge.aceptado::before  { background: var(--green); }

        .status-badge.rechazado { background: rgba(239,68,68,0.1); color: var(--red); }
        .status-badge.rechazado::before { background: var(--red); }

        .status-badge.pendiente { background: rgba(245,158,11,0.1); color: var(--amber); }
        .status-badge.pendiente::before { background: var(--amber); box-shadow: 0 0 0 2px rgba(245,158,11,0.3); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        /* ── Type badge ── */
        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .type-badge.dental    { background: rgba(6,182,212,0.08); color: var(--accent); border: 1px solid rgba(6,182,212,0.2); }
        .type-badge.peluqueria { background: rgba(139,92,246,0.08); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.2); }

        /* ── Actions ── */
        .actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
        }

        .btn-icon:hover { border-color: var(--accent); color: var(--accent); background: rgba(6,182,212,0.05); }
        .btn-icon.danger:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.05); }
        .btn-icon svg { width: 14px; height: 14px; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }

        .empty-state svg {
            width: 48px; height: 48px;
            margin: 0 auto 16px;
            opacity: 0.3;
            display: block;
        }

        .empty-state p { font-size: 15px; }

        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open { display: flex; }

        .modal {
            background: var(--panel);
            border-radius: 24px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease both;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--ink);
        }

        .modal-close {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--muted);
            transition: all 0.2s;
        }

        .modal-close:hover { border-color: var(--red); color: var(--red); }
        .modal-close svg { width: 16px; height: 16px; }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink2);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(6,182,212,0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            justify-content: flex-end;
        }

        .btn-secondary {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .main { margin-left: 0; }
            .content { padding: 16px; }
            .topbar { padding: 0 16px; }
            .form-row { grid-template-columns: 1fr; }
            .search-box { width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left { flex-direction: column; }
            table { font-size: 13px; }
            thead th, tbody td { padding: 12px 12px; }
        }
    </style>
</head>
<body>

    {{template "admin/sidebar.html" .}}

    <main class="main">

        <!-- Topbar -->
        <header class="topbar">
            <span class="topbar-title">Prospectos</span>
            <div class="topbar-right">
                <div class="admin-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    Admin
                </div>
            </div>
        </header>

        <div class="content">

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card" onclick="filterByStatus('all')" id="stat-all">
                    <div class="stat-icon cyan">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-value" id="count-all">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>

                <div class="stat-card" onclick="filterByStatus('pendiente')" id="stat-pendiente">
                    <div class="stat-icon amber">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-value" id="count-pendiente">0</div>
                        <div class="stat-label">Pendientes</div>
                    </div>
                </div>

                <div class="stat-card" onclick="filterByStatus('aceptado')" id="stat-aceptado">
                    <div class="stat-icon green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-value" id="count-aceptado">0</div>
                        <div class="stat-label">Aceptados</div>
                    </div>
                </div>

                <div class="stat-card" onclick="filterByStatus('rechazado')" id="stat-rechazado">
                    <div class="stat-icon red">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-value" id="count-rechazado">0</div>
                        <div class="stat-label">Rechazados</div>
                    </div>
                </div>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="searchInput" placeholder="Buscar negocio, dirección..." oninput="applyFilters()"/>
                    </div>

                    <select class="filter-select" id="typeFilter" onchange="applyFilters()">
                        <option value="">Todos los tipos</option>
                        <option value="dental">Clínica Dental</option>
                        <option value="peluqueria">Peluquería</option>
                    </select>
                </div>

                <button class="btn-primary" onclick="openModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Agregar Prospecto
                </button>
            </div>

            <!-- Table -->
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Negocio</th>
                            <th>Tipo</th>
                            <th>Ciudad</th>
                            <th>Dirección</th>
                            <th>Estado</th>
                            <th>Agregado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="prospectsBody">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                        <circle cx="9" cy="7" r="4"/>
                                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                    </svg>
                                    <p>Cargando prospectos...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <!-- Modal: Agregar / Editar Prospecto -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Nuevo Prospecto</span>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <input type="hidden" id="editId"/>

            <div class="form-group">
                <label>Nombre del Negocio *</label>
                <input type="text" id="fieldName" placeholder="Ej. Clínica Dental Sonrisas" maxlength="120"/>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Tipo de Negocio *</label>
                    <select id="fieldType">
                        <option value="">Seleccionar...</option>
                        <option value="dental">Clínica Dental</option>
                        <option value="peluqueria">Peluquería</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="fieldStatus">
                        <option value="pendiente">Pendiente</option>
                        <option value="aceptado">Aceptado</option>
                        <option value="rechazado">Rechazado</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Ciudad</label>
                <input type="text" id="fieldCity" value="Hermosillo" placeholder="Hermosillo"/>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="fieldAddress" placeholder="Ej. Blvd. Luis Encinas 123, Col. Centro"/>
            </div>

            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveProspect()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Guardar
                </button>
            </div>
        </div>
    </div>

    <script>
        let allProspects = [];
        let activeStatusFilter = 'all';

        // ── Fetch ──
        async function loadProspects() {
            try {
                const res = await fetch('/admin/api/prospects', { credentials: 'include' });
                if (!res.ok) throw new Error('Error al cargar');
                allProspects = await res.json();
            } catch {
                allProspects = [];
            }
            updateCounts();
            applyFilters();
        }

        // ── Counts ──
        function updateCounts() {
            document.getElementById('count-all').textContent       = allProspects.length;
            document.getElementById('count-pendiente').textContent = allProspects.filter(p => p.status === 'pendiente').length;
            document.getElementById('count-aceptado').textContent  = allProspects.filter(p => p.status === 'aceptado').length;
            document.getElementById('count-rechazado').textContent = allProspects.filter(p => p.status === 'rechazado').length;
        }

        // ── Filters ──
        function filterByStatus(status) {
            activeStatusFilter = status;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('filter-active'));
            document.getElementById('stat-' + status)?.classList.add('filter-active');
            applyFilters();
        }

        function applyFilters() {
            const q    = document.getElementById('searchInput').value.toLowerCase().trim();
            const type = document.getElementById('typeFilter').value;

            let list = allProspects.filter(p => {
                const matchStatus = activeStatusFilter === 'all' || p.status === activeStatusFilter;
                const matchType   = !type || p.business_type === type;
                const matchSearch = !q ||
                    p.name.toLowerCase().includes(q) ||
                    (p.address || '').toLowerCase().includes(q) ||
                    (p.city || '').toLowerCase().includes(q);
                return matchStatus && matchType && matchSearch;
            });

            renderTable(list);
        }

        // ── Render ──
        function renderTable(list) {
            const tbody = document.getElementById('prospectsBody');

            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="7">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <p>No hay prospectos con estos filtros</p>
                    </div>
                </td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(p => {
                const typeLabel = p.business_type === 'dental' ? 'Clínica Dental' : 'Peluquería';
                const typeClass = p.business_type === 'dental' ? 'dental' : 'peluqueria';
                const statusLabel = { aceptado: 'Aceptado', rechazado: 'Rechazado', pendiente: 'Pendiente' }[p.status] || p.status;
                const date = p.created_at ? new Date(p.created_at).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' }) : '—';

                return `<tr>
                    <td><strong>${escHtml(p.name)}</strong></td>
                    <td><span class="type-badge ${typeClass}">${typeLabel}</span></td>
                    <td>${escHtml(p.city || 'Hermosillo')}</td>
                    <td>${escHtml(p.address || '—')}</td>
                    <td><span class="status-badge ${p.status}">${statusLabel}</span></td>
                    <td style="color:var(--muted);font-size:13px">${date}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-icon" title="Editar" onclick="editProspect(${p.id})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            <button class="btn-icon danger" title="Eliminar" onclick="deleteProspect(${p.id}, '${escHtml(p.name)}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                    <path d="M10 11v6"/><path d="M14 11v6"/>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // ── Modal ──
        function openModal(prospect = null) {
            document.getElementById('editId').value       = prospect ? prospect.id : '';
            document.getElementById('modalTitle').textContent = prospect ? 'Editar Prospecto' : 'Nuevo Prospecto';
            document.getElementById('fieldName').value    = prospect?.name    || '';
            document.getElementById('fieldType').value   = prospect?.business_type || '';
            document.getElementById('fieldStatus').value = prospect?.status   || 'pendiente';
            document.getElementById('fieldCity').value   = prospect?.city     || 'Hermosillo';
            document.getElementById('fieldAddress').value= prospect?.address  || '';
            document.getElementById('modalBackdrop').classList.add('open');
        }

        function closeModal() {
            document.getElementById('modalBackdrop').classList.remove('open');
        }

        document.getElementById('modalBackdrop').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        // ── Edit ──
        function editProspect(id) {
            const p = allProspects.find(x => x.id === id);
            if (p) openModal(p);
        }

        // ── Save ──
        async function saveProspect() {
            const id      = document.getElementById('editId').value;
            const name    = document.getElementById('fieldName').value.trim();
            const type    = document.getElementById('fieldType').value;
            const status  = document.getElementById('fieldStatus').value;
            const city    = document.getElementById('fieldCity').value.trim() || 'Hermosillo';
            const address = document.getElementById('fieldAddress').value.trim();

            if (!name)  { alert('El nombre del negocio es requerido.'); return; }
            if (!type)  { alert('Selecciona el tipo de negocio.'); return; }

            const body = { name, business_type: type, status, city, address };
            const url    = id ? `/admin/api/prospects/${id}` : '/admin/api/prospects';
            const method = id ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method,
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) throw new Error('Error al guardar');
                closeModal();
                await loadProspects();
            } catch (err) {
                alert('Error al guardar: ' + err.message);
            }
        }

        // ── Delete ──
        async function deleteProspect(id, name) {
            if (!confirm(`¿Eliminar "${name}"?`)) return;
            try {
                const res = await fetch(`/admin/api/prospects/${id}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                if (!res.ok) throw new Error('Error al eliminar');
                await loadProspects();
            } catch (err) {
                alert('Error al eliminar: ' + err.message);
            }
        }

        // ── Util ──
        function escHtml(str) {
            return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Init ──
        filterByStatus('all');
        loadProspects();
    </script>

</body>
</html>
{{end}}
