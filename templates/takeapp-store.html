<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TakeApp — Tienda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f0f0f;
      --paper: #faf9f6;
      --cream: #f2ede4;
      --accent: #ff4d00;
      --accent2: #00c896;
      --muted: #888;
      --border: #e0dbd2;
      --card-bg: #fff;
      --radius: 14px;
      --sidebar-w: 360px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(250,249,246,.94); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-back { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--ink); font-size: .9rem; font-weight: 500; }
    .nav-back svg { color: var(--muted); }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; text-decoration: none; color: var(--ink); }
    .nav-logo span { color: var(--accent); }
    .nav-cart-btn {
      position: relative;
      background: var(--ink); color: #fff;
      border: none; border-radius: 999px;
      padding: 8px 18px; font-family: 'DM Sans', sans-serif;
      font-size: .875rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      transition: background .2s;
    }
    .nav-cart-btn:hover { background: #333; }
    .cart-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--accent); color: #fff;
      font-size: .65rem; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    /* ── LAYOUT ── */
    .layout {
      max-width: 1280px; margin: 0 auto; padding: 0 2rem;
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      gap: 2.5rem;
      align-items: start;
      padding-top: 2rem; padding-bottom: 6rem;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* ── STORE HEADER ── */
    .store-header { margin-bottom: 2rem; animation: fadeUp .4s ease both; }
    .store-cover {
      height: 220px; border-radius: var(--radius);
      background: var(--cream); overflow: hidden; margin-bottom: 1.25rem;
    }
    .store-cover img { width: 100%; height: 100%; object-fit: cover; }
    .store-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      background: linear-gradient(135deg, var(--cream), #e8e2d7);
    }
    .store-meta { display: flex; gap: 1rem; align-items: flex-start; }
    .store-info { flex: 1; }
    .store-type-badge {
      display: inline-block;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: .72rem; font-weight: 600; text-transform: capitalize;
      padding: 3px 10px; color: var(--muted); margin-bottom: 6px;
    }
    .store-name { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1.1; margin-bottom: .5rem; }
    .store-desc { font-size: .9rem; color: #555; line-height: 1.6; max-width: 560px; }
    .store-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .store-chip { display: flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--muted); }
    .store-chip svg { flex-shrink: 0; }
    .social-links { display: flex; gap: 8px; margin-top: 10px; }
    .social-link { color: var(--muted); text-decoration: none; font-size: .8rem; display: flex; align-items: center; gap: 4px; }
    .social-link:hover { color: var(--ink); }

    /* ── SECTION TITLE ── */
    .section-label {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem;
      text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── PRODUCTS ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .product-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      animation: cardIn .45s ease both;
    }
    .product-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.07); }
    .product-img {
      height: 160px; background: var(--cream); overflow: hidden; position: relative;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s; }
    .product-card:hover .product-img img { transform: scale(1.05); }
    .product-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    .promo-tag {
      position: absolute; top: 8px; right: 8px;
      background: var(--accent); color: #fff;
      font-size: .65rem; font-weight: 700; padding: 3px 8px; border-radius: 999px;
    }
    .product-body { padding: 1rem; }
    .product-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; margin-bottom: 5px; }
    .product-desc {
      font-size: .8rem; color: #666; line-height: 1.5; margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-footer { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    .price-wrap { display: flex; align-items: baseline; gap: 6px; }
    .price-main { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; }
    .price-original { font-size: .78rem; color: var(--muted); text-decoration: line-through; }
    .add-btn {
      background: var(--ink); color: #fff;
      border: none; border-radius: 999px;
      padding: 7px 14px; font-size: .82rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent); }
    .add-btn:active { transform: scale(.97); }
    .qty-ctrl {
      display: flex; align-items: center; gap: 6px;
      background: var(--cream); border-radius: 999px; padding: 4px 10px;
    }
    .qty-btn {
      background: none; border: none; width: 22px; height: 22px;
      border-radius: 50%; cursor: pointer; font-size: 1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .qty-btn:hover { background: var(--border); }
    .qty-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .9rem; min-width: 18px; text-align: center; }

    /* ── SIDEBAR / CART ── */
    .sidebar { position: sticky; top: 80px; }
    .cart-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp .4s .1s ease both;
    }
    .cart-header {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cart-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .cart-clear { background: none; border: none; font-size: .78rem; color: var(--muted); cursor: pointer; }
    .cart-clear:hover { color: var(--accent); }
    .cart-empty {
      padding: 3rem 1.5rem; text-align: center; color: var(--muted); font-size: .9rem;
    }
    .cart-empty-icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .cart-items { padding: .5rem 0; max-height: 300px; overflow-y: auto; }
    .cart-item {
      padding: .65rem 1.25rem;
      display: flex; align-items: center; gap: .75rem;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .ci-name { flex: 1; font-size: .875rem; font-weight: 500; }
    .ci-qty { font-size: .78rem; color: var(--muted); }
    .ci-price { font-family: 'Syne', sans-serif; font-size: .88rem; font-weight: 700; }
    .ci-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1; }
    .ci-remove:hover { color: var(--accent); }
    .cart-total-box {
      padding: 1rem 1.25rem;
      border-top: 2px solid var(--border);
    }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
    .total-label { font-size: .9rem; color: var(--muted); }
    .total-amount { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; }

    /* ── CUSTOMER FORM ── */
    .customer-form { padding: 0 1.25rem 1.25rem; }
    .form-group { margin-bottom: .75rem; }
    .form-label { display: block; font-size: .78rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
    .form-input {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; color: var(--ink);
      background: var(--card-bg); outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: #bbb; }

    /* ── PAYMENT METHODS ── */
    .pay-methods { padding: 0 1.25rem; margin-bottom: 1rem; }
    .pay-label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .75rem; display: block; }
    .pay-options { display: flex; gap: .5rem; flex-wrap: wrap; }
    .pay-opt {
      flex: 1; min-width: 90px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: .65rem .75rem; cursor: pointer;
      text-align: center; transition: all .2s;
      background: var(--paper);
    }
    .pay-opt:hover { border-color: var(--ink); }
    .pay-opt.selected { border-color: var(--ink); background: var(--ink); color: #fff; }
    .pay-opt.selected .pay-opt-icon { filter: invert(1); }
    .pay-opt-icon { font-size: 1.3rem; display: block; margin-bottom: 3px; }
    .pay-opt-name { font-size: .72rem; font-weight: 600; }
    .spei-info {
      background: var(--cream); border-radius: 10px; padding: .9rem;
      margin: 0 1.25rem 1rem; font-size: .83rem; line-height: 1.6;
      display: none;
    }
    .spei-info strong { font-weight: 700; font-family: 'Syne', sans-serif; }
    .spei-clabe {
      font-family: monospace; font-size: 1rem; font-weight: 700;
      letter-spacing: .1em; margin: .4rem 0;
      display: flex; align-items: center; gap: 8px;
    }
    .spei-copy-btn {
      background: none; border: 1.5px solid var(--border);
      border-radius: 6px; padding: 3px 8px; font-size: .7rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .spei-copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── CHECKOUT BUTTON ── */
    .checkout-btn {
      width: calc(100% - 2.5rem); margin: 0 1.25rem 1.25rem;
      display: block; padding: 14px;
      background: var(--ink); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: background .2s, transform .1s;
    }
    .checkout-btn:hover:not(:disabled) { background: var(--accent); }
    .checkout-btn:active:not(:disabled) { transform: scale(.99); }
    .checkout-btn:disabled { opacity: .45; cursor: not-allowed; }
    .checkout-btn.loading { position: relative; color: transparent; }
    .checkout-btn.loading::after {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── SUCCESS MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg); border-radius: 20px;
      padding: 2.5rem; max-width: 420px; width: 100%;
      text-align: center;
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    .modal-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: .5rem; }
    .modal-sub { color: var(--muted); font-size: .9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .modal-order-box {
      background: var(--cream); border-radius: 10px; padding: 1rem;
      margin-bottom: 1.5rem; text-align: left; font-size: .85rem; line-height: 1.7;
    }
    .modal-order-box strong { font-family: 'Syne', sans-serif; }
    .wa-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: #25D366; color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      text-decoration: none; cursor: pointer;
      transition: background .2s;
    }
    .wa-btn:hover { background: #20b858; }
    .modal-skip { display: block; margin-top: .75rem; font-size: .82rem; color: var(--muted); cursor: pointer; text-decoration: underline; }
    .modal-skip:hover { color: var(--ink); }

    /* ── MOBILE CART FAB ── */
    .mob-cart {
      display: none;
      position: fixed; bottom: 1.5rem; left: 1.5rem; right: 1.5rem; z-index: 100;
      background: var(--ink); color: #fff;
      border: none; border-radius: 14px;
      padding: 14px 1.5rem;
      font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .mob-cart.hidden { display: none !important; }
    @media (max-width: 900px) {
      .mob-cart { display: flex; }
    }

    /* ── MOBILE CART DRAWER ── */
    .cart-drawer {
      display: none;
      position: fixed; inset: 0; z-index: 300;
    }
    .cart-drawer.open { display: block; }
    .cart-drawer-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
    .cart-drawer-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--card-bg);
      border-radius: 20px 20px 0 0;
      padding-bottom: env(safe-area-inset-bottom, 16px);
      max-height: 85vh; overflow-y: auto;
      animation: slideUp .3s ease both;
    }
    .drawer-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes cardIn { from { opacity:0; transform:translateY(18px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes popIn  { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }
    @keyframes slideUp{ from { transform:translateY(100%); } to { transform:translateY(0); } }
    @keyframes spin   { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/takeapp" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    Directorio
  </a>
  <a href="/takeapp" class="nav-logo">Take<span>App</span></a>
  <button class="nav-cart-btn" id="navCartBtn" onclick="openDrawer()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    Carrito
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</nav>

<!-- MAIN LAYOUT -->
<div class="layout" id="layout">

  <!-- LEFT: Store info + products -->
  <div class="main-col">

    <!-- Store header skeleton -->
    <div class="store-header" id="storeHeader">
      <div class="store-cover">
        <div class="store-cover-placeholder" id="storeCoverPlaceholder" style="font-size:4rem">🏪</div>
        <img id="storeCoverImg" style="display:none" alt="" />
      </div>
      <div class="store-meta">
        <div class="store-info">
          <span class="store-type-badge" id="storeType">Cargando...</span>
          <div class="store-name" id="storeName">―</div>
          <p class="store-desc" id="storeDesc"></p>
          <div class="store-chips" id="storeChips"></div>
          <div class="social-links" id="socialLinks"></div>
        </div>
      </div>
    </div>

    <!-- Products -->
    <p class="section-label">Productos y servicios</p>
    <div class="products-grid" id="productsGrid">
      <!-- Skeletons -->
      <div class="product-card" style="pointer-events:none">
        <div class="product-img" style="background:linear-gradient(90deg,#f2ede4 25%,#e8e2d7 50%,#f2ede4 75%);background-size:200% 100%;animation:shimmer 1.4s ease infinite"></div>
        <div class="product-body">
          <div style="height:14px;background:#e8e2d7;border-radius:4px;width:70%;margin-bottom:8px;animation:shimmer 1.4s ease infinite;background-size:200% 100%"></div>
          <div style="height:11px;background:#e8e2d7;border-radius:4px;width:90%;margin-bottom:5px;animation:shimmer 1.4s ease infinite;background-size:200% 100%"></div>
        </div>
      </div>
      <div class="product-card" style="pointer-events:none">
        <div class="product-img" style="background:linear-gradient(90deg,#f2ede4 25%,#e8e2d7 50%,#f2ede4 75%);background-size:200% 100%;animation:shimmer 1.4s ease infinite"></div>
        <div class="product-body">
          <div style="height:14px;background:#e8e2d7;border-radius:4px;width:60%;margin-bottom:8px;animation:shimmer 1.4s ease infinite;background-size:200% 100%"></div>
          <div style="height:11px;background:#e8e2d7;border-radius:4px;width:80%;animation:shimmer 1.4s ease infinite;background-size:200% 100%"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT: Cart sidebar (desktop) -->
  <div class="sidebar">
    <div class="cart-panel" id="cartPanel">
      <div class="cart-header">
        <span class="cart-title">Tu pedido</span>
        <button class="cart-clear" onclick="clearCart()">Limpiar</button>
      </div>
      <div id="cartContent">
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          Agrega productos para comenzar
        </div>
      </div>
    </div>
  </div>

</div>

<!-- MOBILE CART FAB -->
<button class="mob-cart hidden" id="mobCartBtn" onclick="openDrawer()">
  <span id="mobCartLabel">Ver pedido</span>
  <span id="mobCartTotal" style="font-size:.95rem"></span>
</button>

<!-- MOBILE CART DRAWER -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-overlay" onclick="closeDrawer()"></div>
  <div class="cart-drawer-panel" id="drawerPanel">
    <div class="drawer-handle"></div>
    <div id="drawerContent"></div>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
  <div class="modal">
    <div class="modal-icon">🎉</div>
    <div class="modal-title">¡Pago completado!</div>
    <p class="modal-sub">Tu pedido fue procesado exitosamente. Envía el resumen al negocio por WhatsApp.</p>
    <div class="modal-order-box" id="modalOrderBox"></div>
    <a class="wa-btn" id="waBtn" href="#" target="_blank">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
      Enviar resumen por WhatsApp
    </a>
    <span class="modal-skip" onclick="closeModal()">Omitir por ahora</span>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  const BRANCH_ID = parseInt(location.pathname.split('/').pop()) || 0;
  let store = null;
  let cart = {}; // { serviceIndex: qty }
  let payMethod = 'stripe'; // 'stripe' | 'spei'

  // ── Init ───────────────────────────────────────────────────────────────────
  (async () => {
    await loadStore();
    checkPaymentReturn();
  })();

  async function loadStore() {
    try {
      const res = await fetch(`/api/takeapp/stores/${BRANCH_ID}`);
      if (!res.ok) { showError(); return; }
      const data = await res.json();
      store = data.store;
      renderStore();
      renderProducts();
    } catch (e) { showError(); }
  }

  function showError() {
    document.getElementById('productsGrid').innerHTML =
      `<div style="grid-column:1/-1;padding:4rem;text-align:center;color:var(--muted)">
        <div style="font-size:2.5rem;margin-bottom:1rem">😕</div>
        <strong style="font-family:'Syne',sans-serif;font-size:1.1rem">Negocio no encontrado</strong><br>
        <span style="font-size:.9rem">Verifica la URL o vuelve al directorio</span>
      </div>`;
  }

  function renderStore() {
    document.title = `${store.name} — TakeApp`;

    document.getElementById('storeType').textContent = store.businessType || 'Negocio';
    document.getElementById('storeName').textContent = store.name;
    document.getElementById('storeDesc').textContent = store.description || '';

    // Cover image
    if (store.services) {
      for (const s of store.services) {
        if (s.images && s.images[0]) {
          const img = document.getElementById('storeCoverImg');
          img.src = s.images[0]; img.style.display = 'block';
          document.getElementById('storeCoverPlaceholder').style.display = 'none';
          break;
        }
      }
    }

    // Chips: location, phone
    const chips = [];
    const city = [store.location?.city, store.location?.state].filter(Boolean).join(', ');
    if (city) chips.push(`<span class="store-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-5-8-12a8 8 0 0 1 16 0c0 7-8 12-8 12z"/><circle cx="12" cy="10" r="3"/></svg>${city}</span>`);
    if (store.phone) chips.push(`<span class="store-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.47 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.54a16 16 0 0 0 6 6l.54-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16z"/></svg>${store.phone}</span>`);
    document.getElementById('storeChips').innerHTML = chips.join('');

    // Social
    const socials = [];
    if (store.socialMedia?.instagram) socials.push(`<a href="https://instagram.com/${store.socialMedia.instagram.replace('@','')}" target="_blank" class="social-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>Instagram</a>`);
    if (store.socialMedia?.facebook) socials.push(`<a href="${store.socialMedia.facebook}" target="_blank" class="social-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>Facebook</a>`);
    document.getElementById('socialLinks').innerHTML = socials.join('');
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    if (!store.services || store.services.length === 0) {
      grid.innerHTML = `<div style="grid-column:1/-1;padding:3rem;text-align:center;color:var(--muted)">Este negocio aún no tiene productos publicados.</div>`;
      return;
    }

    grid.innerHTML = store.services.map((svc, i) => {
      const imgs = svc.images || [];
      const imgHTML = imgs[0]
        ? `<img src="${imgs[0]}" alt="${svc.title}" loading="lazy" />`
        : `<div class="product-img-placeholder">🛍️</div>`;
      const isPromo = svc.priceType === 'promotion' && svc.promoPrice > 0;

      return `
        <div class="product-card" id="card-${i}" style="animation-delay:${i*.05}s">
          <div class="product-img">
            ${imgHTML}
            ${isPromo ? '<span class="promo-tag">Promo</span>' : ''}
          </div>
          <div class="product-body">
            <div class="product-title">${svc.title}</div>
            ${svc.description ? `<div class="product-desc">${svc.description}</div>` : ''}
            <div class="product-footer">
              <div class="price-wrap">
                <span class="price-main">$${fmt(svc.price)} MXN</span>
                ${isPromo ? `<span class="price-original">$${fmt(svc.originalPrice)}</span>` : ''}
              </div>
              <div id="ctrl-${i}">${renderAddBtn(i)}</div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderAddBtn(i) {
    return `<button class="add-btn" onclick="addItem(${i})">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Agregar
    </button>`;
  }

  function renderQtyCtrl(i, qty) {
    return `<div class="qty-ctrl">
      <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
      <span class="qty-val">${qty}</span>
      <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
    </div>`;
  }

  // ── Cart actions ───────────────────────────────────────────────────────────
  function addItem(i) {
    cart[i] = (cart[i] || 0) + 1;
    updateCtrl(i);
    renderCart();
  }

  function changeQty(i, delta) {
    cart[i] = (cart[i] || 0) + delta;
    if (cart[i] <= 0) delete cart[i];
    updateCtrl(i);
    renderCart();
  }

  function clearCart() {
    cart = {};
    Object.keys(cart).forEach(i => updateCtrl(i));
    store.services.forEach((_, i) => updateCtrl(i));
    renderCart();
  }

  function updateCtrl(i) {
    const el = document.getElementById(`ctrl-${i}`);
    if (!el) return;
    const qty = cart[i] || 0;
    el.innerHTML = qty > 0 ? renderQtyCtrl(i, qty) : renderAddBtn(i);
  }

  function cartItems() {
    return Object.entries(cart).map(([i, qty]) => ({
      serviceIndex: parseInt(i),
      title: store.services[i].title,
      price: store.services[i].price,
      quantity: qty
    }));
  }

  function cartTotal() {
    return cartItems().reduce((sum, it) => sum + it.price * it.quantity, 0);
  }

  function cartCount() {
    return Object.values(cart).reduce((a, b) => a + b, 0);
  }

  // ── Render cart panel ──────────────────────────────────────────────────────
  function renderCart() {
    const items = cartItems();
    const total = cartTotal();
    const count = cartCount();

    // Badge
    const badge = document.getElementById('cartBadge');
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';

    // Mobile FAB
    const fab = document.getElementById('mobCartBtn');
    if (count > 0) {
      fab.classList.remove('hidden');
      document.getElementById('mobCartLabel').textContent = `Ver pedido (${count})`;
      document.getElementById('mobCartTotal').textContent = `$${fmt(total)} MXN`;
    } else {
      fab.classList.add('hidden');
    }

    const html = buildCartHTML(items, total);
    document.getElementById('cartContent').innerHTML = html;

    // Also update drawer if open
    if (document.getElementById('cartDrawer').classList.contains('open')) {
      document.getElementById('drawerContent').innerHTML = html;
    }
  }

  function buildCartHTML(items, total) {
    if (items.length === 0) {
      return `<div class="cart-empty"><div class="cart-empty-icon">🛒</div>Agrega productos para comenzar</div>`;
    }

    const hasSPEI = store?.payments?.hasSPEI;
    const hasStripe = store?.payments?.hasStripe;

    let speiSection = '';
    if (hasSPEI && payMethod === 'spei') {
      speiSection = `<div class="spei-info" id="speiInfo" style="display:block">
        <strong>Datos de transferencia SPEI</strong><br>
        Titular: ${store.payments.accountName || '—'}<br>
        Banco: ${store.payments.bankName || '—'}<br>
        <div class="spei-clabe">
          ${store.payments.clabeNumber || '—'}
          <button class="spei-copy-btn" onclick="copyCLABE()">Copiar</button>
        </div>
        <small style="color:var(--muted)">Envía el comprobante por WhatsApp al negocio</small>
      </div>`;
    }

    const payOpts = [
      hasStripe ? `<div class="pay-opt${payMethod==='stripe'?' selected':''}" onclick="selectPay('stripe')"><span class="pay-opt-icon">💳</span><span class="pay-opt-name">Tarjeta</span></div>` : '',
      hasSPEI   ? `<div class="pay-opt${payMethod==='spei'  ?' selected':''}" onclick="selectPay('spei')"><span class="pay-opt-icon">🏦</span><span class="pay-opt-name">SPEI</span></div>` : '',
    ].filter(Boolean).join('');

    const btnLabel = payMethod === 'stripe' ? 'Pagar con tarjeta' : 'Ver datos SPEI';
    const noPayment = !hasSPEI && !hasStripe;

    return `
      <div class="cart-items">
        ${items.map(it => `
          <div class="cart-item">
            <div class="ci-name">${it.title}</div>
            <div class="ci-qty">×${it.quantity}</div>
            <div class="ci-price">$${fmt(it.price * it.quantity)}</div>
            <button class="ci-remove" onclick="changeQty(${it.serviceIndex},-${it.quantity})">✕</button>
          </div>`).join('')}
      </div>
      <div class="cart-total-box">
        <div class="total-row">
          <span class="total-label">Total</span>
          <span class="total-amount">$${fmt(total)} MXN</span>
        </div>
      </div>
      <div class="customer-form">
        <div class="form-group">
          <label class="form-label">Nombre *</label>
          <input class="form-input" id="custName" type="text" placeholder="Tu nombre completo" />
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono *</label>
          <input class="form-input" id="custPhone" type="tel" placeholder="662 123 4567" />
        </div>
        <div class="form-group">
          <label class="form-label">Email (opcional)</label>
          <input class="form-input" id="custEmail" type="email" placeholder="tu@correo.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Notas</label>
          <input class="form-input" id="custNotes" type="text" placeholder="Indicaciones especiales..." />
        </div>
      </div>
      ${payOpts ? `<div class="pay-methods"><span class="pay-label">Método de pago</span><div class="pay-options">${payOpts}</div></div>` : ''}
      ${speiSection}
      ${noPayment ? '' : `<button class="checkout-btn" id="checkoutBtn" onclick="doCheckout()">${btnLabel}</button>`}
      ${noPayment ? '<div style="padding:1rem;text-align:center;color:var(--muted);font-size:.85rem">Este negocio no tiene métodos de pago configurados.</div>' : ''}
    `;
  }

  function selectPay(method) {
    payMethod = method;
    renderCart();
  }

  // ── Checkout ───────────────────────────────────────────────────────────────
  async function doCheckout() {
    const name = document.getElementById('custName')?.value.trim();
    const phone = document.getElementById('custPhone')?.value.trim();
    const email = document.getElementById('custEmail')?.value.trim();
    const notes = document.getElementById('custNotes')?.value.trim();

    if (!name || !phone) {
      alert('Por favor ingresa tu nombre y teléfono.');
      return;
    }

    if (payMethod === 'spei') {
      // SPEI: mostrar datos y abrir WhatsApp
      const waText = buildWAText(name, cartItems(), cartTotal(), notes);
      const phone = store.whatsappNumber ? sanitizePhone(store.whatsappNumber) : '';
      if (phone) window.open(`https://wa.me/${phone}?text=${waText}`, '_blank');
      return;
    }

    // Stripe
    const btn = document.getElementById('checkoutBtn');
    if (btn) { btn.disabled = true; btn.classList.add('loading'); }

    try {
      const res = await fetch('/api/takeapp/checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          branchId: BRANCH_ID,
          items: cartItems(),
          customerName: name,
          customerPhone: phone,
          customerEmail: email,
          notes: notes,
        })
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Error iniciando el pago'); return; }
      window.location.href = data.checkoutUrl;
    } catch (e) {
      alert('Error de conexión. Intenta de nuevo.');
    } finally {
      if (btn) { btn.disabled = false; btn.classList.remove('loading'); }
    }
  }

  // ── Check payment return ────────────────────────────────────────────────────
  async function checkPaymentReturn() {
    const params = new URLSearchParams(location.search);
    if (params.get('payment') === 'success') {
      const sessionId = params.get('session_id');
      if (!sessionId) return;
      try {
        const res = await fetch('/api/takeapp/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, branchId: BRANCH_ID })
        });
        const data = await res.json();
        if (res.ok) showSuccess(data);
      } catch (e) { console.error(e); }
      // Limpiar URL
      history.replaceState({}, '', location.pathname);
    }
    if (params.get('payment') === 'cancelled') {
      history.replaceState({}, '', location.pathname);
    }
  }

  function showSuccess(data) {
    const box = document.getElementById('modalOrderBox');
    box.innerHTML = `
      <strong>Resumen del pedido</strong><br>
      🛒 ${data.orderSummary}<br>
      💰 Total: $${fmt(data.total)} MXN<br>
      👤 ${data.customerName}
    `;

    if (data.whatsappUrl) {
      document.getElementById('waBtn').href = data.whatsappUrl;
    } else {
      document.getElementById('waBtn').style.display = 'none';
    }

    document.getElementById('successModal').classList.add('open');
    cart = {}; renderCart();
    store.services.forEach((_, i) => updateCtrl(i));
  }

  function closeModal() {
    document.getElementById('successModal').classList.remove('open');
  }

  // ── Drawer ─────────────────────────────────────────────────────────────────
  function openDrawer() {
    const items = cartItems();
    document.getElementById('drawerContent').innerHTML = buildCartHTML(items, cartTotal());
    document.getElementById('cartDrawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('cartDrawer').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmt(n) {
    return Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
  }

  function sanitizePhone(phone) {
    const clean = phone.replace(/\D/g, '');
    return clean.length === 10 ? '52' + clean : clean;
  }

  function buildWAText(name, items, total, notes) {
    let msg = `✅ *Pedido de ${name}*%0A%0A`;
    items.forEach(it => { msg += `• ${it.quantity}x ${it.title} — $${fmt(it.price * it.quantity)}%0A`; });
    msg += `%0A💰 *Total:* $${fmt(total)} MXN`;
    if (notes) msg += `%0A📝 *Notas:* ${notes}`;
    msg += `%0A%0A_Pedido vía TakeApp · Pago por SPEI pendiente_`;
    return msg;
  }

  function copyCLABE() {
    const clabe = store?.payments?.clabeNumber?.replace(/•/g, '') || '';
    navigator.clipboard.writeText(clabe).then(() => {
      const btn = document.querySelector('.spei-copy-btn');
      if (btn) { btn.textContent = '¡Copiado!'; setTimeout(() => btn.textContent = 'Copiar', 2000); }
    });
  }
</script>
</body>
</html>
