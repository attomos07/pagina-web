{{define "admin/login.html"}}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Attomos Admin — Acceso</title>
    <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:       #0a0a0f;
            --ink-2:     #1a1a2e;
            --surface:   #f5f4f0;
            --panel:     #ffffff;
            --accent:    #06b6d4;
            --accent-2:  #0891b2;
            --muted:     #6b7280;
            --border:    #e5e7eb;
            --danger:    #ef4444;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Grid background ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(6,182,212,.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6,182,212,.06) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(6,182,212,.15); top: -100px; right: -100px; animation: drift 12s ease-in-out infinite alternate; }
        .orb-2 { width: 300px; height: 300px; background: rgba(8,145,178,.12); bottom: -80px; left: -80px; animation: drift 16s ease-in-out infinite alternate-reverse; }
        @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.05); } }

        /* ── Card ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 52px 48px;
            width: 100%;
            max-width: 440px;
            box-shadow:
                0 0 0 1px rgba(6,182,212,.08),
                0 32px 64px rgba(10,10,15,.12),
                0 8px 24px rgba(10,10,15,.08);
            animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Logo mark ── */
        .logo-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: var(--ink);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-icon i { color: var(--accent); font-size: 20px; }
        .logo-text { font-family: 'Syne', sans-serif; }
        .logo-text .name { font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
        .logo-text .tag  { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

        /* ── Heading ── */
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px; font-weight: 800;
            color: var(--ink); letter-spacing: -.5px;
            margin-bottom: 6px;
        }
        .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 36px; }

        /* ── Form ── */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-2); margin-bottom: 8px; letter-spacing: .2px; }

        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--muted); font-size: 16px; transition: color .2s;
            pointer-events: none;
        }
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--ink);
            background: #fafafa;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(6,182,212,.1); }
        input:focus + i, .input-wrap:focus-within i { color: var(--accent); }

        /* Mover el icono antes del input para poder usar ~ */
        .input-wrap i { order: 0; }

        /* ── Password toggle ── */
        .eye-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; color: var(--muted);
            font-size: 16px; padding: 2px; transition: color .2s;
        }
        .eye-btn:hover { color: var(--accent); }

        /* ── Submit ── */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--ink);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
            letter-spacing: .3px;
            cursor: pointer;
            margin-top: 8px;
            transition: background .2s, transform .15s, box-shadow .2s;
            position: relative; overflow: hidden;
        }
        .btn-login::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(6,182,212,.2), transparent);
            opacity: 0; transition: opacity .3s;
        }
        .btn-login:hover { background: var(--ink-2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(10,10,15,.2); }
        .btn-login:hover::after { opacity: 1; }
        .btn-login:active { transform: translateY(0); }

        /* ── Loading state ── */
        .btn-login.loading { pointer-events: none; }
        .btn-login.loading .btn-text { opacity: 0; }
        .btn-login .spinner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }
        .btn-login.loading .spinner { display: block; }
        @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

        /* ── Error msg ── */
        .error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 20px;
            align-items: center;
            gap: 8px;
        }
        .error-msg.show { display: flex; animation: shake .4s ease; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ── Divider ── */
        .card-footer { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 12px; color: var(--muted); }
        .card-footer span { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-card">
        <div class="logo-mark">
            <div class="logo-icon"><i class="lni lni-bolt-alt"></i></div>
            <div class="logo-text">
                <div class="name">Attomos</div>
                <div class="tag">Admin Panel</div>
            </div>
        </div>

        <h1>Acceso restringido</h1>
        <p class="subtitle">Ingresa tus credenciales de administrador para continuar.</p>

        <div class="error-msg" id="errorMsg">
            <i class="lni lni-warning"></i>
            <span id="errorText">Credenciales incorrectas.</span>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
            <div class="form-group">
                <label for="identifier">Correo o usuario</label>
                <div class="input-wrap">
                    <i class="lni lni-user"></i>
                    <input type="text" id="identifier" placeholder="admin@attomos.com" autocomplete="username" required/>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-wrap">
                    <i class="lni lni-lock-alt"></i>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
                    <button type="button" class="eye-btn" onclick="togglePassword()" id="eyeBtn">
                        <i class="lni lni-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <span class="btn-text">Ingresar al panel</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="card-footer">
            Panel exclusivo para <span>administradores de Attomos</span>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'lni lni-eye-alt';
            } else {
                input.type = 'password';
                icon.className = 'lni lni-eye';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn        = document.getElementById('loginBtn');
            const errorMsg   = document.getElementById('errorMsg');
            const errorText  = document.getElementById('errorText');
            const identifier = document.getElementById('identifier').value.trim();
            const password   = document.getElementById('password').value;

            errorMsg.classList.remove('show');
            btn.classList.add('loading');

            try {
                const res = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ identifier, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    window.location.href = '/admin/database-admin';
                } else {
                    errorText.textContent = data.error || 'Credenciales incorrectas.';
                    errorMsg.classList.add('show');
                }
            } catch {
                errorText.textContent = 'Error de conexión. Intenta de nuevo.';
                errorMsg.classList.add('show');
            } finally {
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
{{end}}
