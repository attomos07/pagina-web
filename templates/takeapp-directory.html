<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TakeApp — Descubre negocios locales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0f0f;
      --paper: #faf9f6;
      --cream: #f2ede4;
      --accent: #ff4d00;
      --accent2: #00c896;
      --muted: #888;
      --border: #e0dbd2;
      --card-bg: #ffffff;
      --radius: 16px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250, 249, 246, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--ink);
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .nav-right { display: flex; gap: 1rem; align-items: center; }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color .2s; }
    .nav-link:hover { color: var(--ink); }

    /* ── HERO ── */
    .hero {
      padding: 5rem 2rem 4rem;
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 1.5rem;
      animation: fadeUp .5s ease both;
    }
    .hero-eyebrow i { font-size: 0.75rem; }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      animation: fadeUp .5s .08s ease both;
    }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p {
      margin-top: 1.2rem;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 300;
      line-height: 1.65;
      animation: fadeUp .5s .16s ease both;
    }

    /* ── SEARCH ── */
    .search-wrap {
      max-width: 560px;
      margin: 2.5rem auto 0;
      position: relative;
      animation: fadeUp .5s .24s ease both;
    }
    .search-wrap svg {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: 2px solid var(--border);
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      background: var(--card-bg);
      color: var(--ink);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255,77,0,0.08);
    }
    #searchInput::placeholder { color: var(--muted); }

    /* ── FILTERS ── */
    .filters {
      max-width: 1200px;
      margin: 2.5rem auto 0;
      padding: 0 2rem;
      display: flex; gap: 8px; flex-wrap: wrap;
      animation: fadeUp .5s .3s ease both;
    }
    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--card-bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    /* ── GRID ── */
    .stores-section {
      max-width: 1200px;
      margin: 2.5rem auto 6rem;
      padding: 0 2rem;
    }
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .section-count { font-size: 0.875rem; color: var(--muted); }

    .stores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* ── STORE CARD ── */
    .store-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform .25s, box-shadow .25s;
      animation: cardIn .5s ease both;
    }
    .store-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.09);
    }
    .card-image {
      height: 180px;
      background: var(--cream);
      overflow: hidden;
      position: relative;
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s ease;
    }
    .store-card:hover .card-image img { transform: scale(1.04); }
    .card-image-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      background: linear-gradient(135deg, var(--cream), #e8e2d7);
    }
    .card-type-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(15,15,15,0.75);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: capitalize;
    }
    .card-body {
      padding: 1.1rem 1.25rem 1.25rem;
    }
    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .card-location {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 10px;
    }
    .card-desc {
      font-size: 0.85rem;
      color: #555;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .card-payments {
      display: flex; gap: 5px;
    }
    .pay-chip {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 5px;
    }
    .pay-chip.stripe { background: #ede9ff; color: #5046e5; }
    .pay-chip.spei   { background: #e6faf4; color: #059669; }

    /* ── EMPTY & LOADING ── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .state-icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-title { font-family: 'Syne', sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .state-sub { font-size: 0.9rem; }

    .skeleton {
      background: linear-gradient(90deg, var(--cream) 25%, #ece7de 50%, var(--cream) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .hero { padding: 3rem 1.25rem 2.5rem; }
      .stores-section { padding: 0 1.25rem; }
      .filters { padding: 0 1.25rem; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="/takeapp" class="nav-logo">
    Take<span>App</span>
    <span class="nav-badge">Beta</span>
  </a>
  <div class="nav-right">
    <a href="/" class="nav-link">Attomos</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-eyebrow">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <circle cx="6" cy="6" r="5" fill="#ff4d00"/>
    </svg>
    Negocios locales · Pago seguro · Confirmación por WhatsApp
  </div>
  <h1>Compra en tus <em>negocios</em><br>favoritos</h1>
  <p>Descubre productos y servicios de negocios locales.<br>Paga con tarjeta y recibe confirmación directo en WhatsApp.</p>
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Buscar negocios, servicios, ciudades..." />
  </div>
</section>

<!-- FILTERS -->
<div class="filters" id="filters">
  <button class="filter-btn active" data-type="">Todos</button>
  <button class="filter-btn" data-type="salon">Salones</button>
  <button class="filter-btn" data-type="pizzeria">Pizzerías</button>
  <button class="filter-btn" data-type="clinica">Clínicas</button>
  <button class="filter-btn" data-type="restaurante">Restaurantes</button>
  <button class="filter-btn" data-type="tienda">Tiendas</button>
  <button class="filter-btn" data-type="spa">Spa & Bienestar</button>
</div>

<!-- GRID -->
<section class="stores-section">
  <div class="section-header">
    <span class="section-title">Negocios disponibles</span>
    <span class="section-count" id="storeCount">Cargando...</span>
  </div>
  <div class="stores-grid" id="storesGrid">
    <!-- Skeleton loaders -->
    <div class="store-card" style="pointer-events:none">
      <div class="card-image skeleton"></div>
      <div class="card-body">
        <div class="skeleton" style="height:18px;width:70%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:45%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:11px;width:90%;margin-bottom:5px;"></div>
        <div class="skeleton" style="height:11px;width:75%;"></div>
      </div>
    </div>
    <div class="store-card" style="pointer-events:none">
      <div class="card-image skeleton"></div>
      <div class="card-body">
        <div class="skeleton" style="height:18px;width:60%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:40%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:11px;width:85%;margin-bottom:5px;"></div>
        <div class="skeleton" style="height:11px;width:65%;"></div>
      </div>
    </div>
    <div class="store-card" style="pointer-events:none">
      <div class="card-image skeleton"></div>
      <div class="card-body">
        <div class="skeleton" style="height:18px;width:80%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:50%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:11px;width:95%;margin-bottom:5px;"></div>
        <div class="skeleton" style="height:11px;width:70%;"></div>
      </div>
    </div>
  </div>
</section>

<script>
  const EMOJIS = { salon:'💇', pizzeria:'🍕', clinica:'🏥', restaurante:'🍽️', spa:'🧘', tienda:'🛍️', default:'🏪' };

  let allStores = [];
  let activeType = '';
  let searchQuery = '';
  let searchTimer;

  // Init
  fetchStores();
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderStores();
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.toLowerCase().trim();
      renderStores();
    }, 250);
  });

  async function fetchStores() {
    try {
      const res = await fetch('/api/takeapp/stores');
      const data = await res.json();
      allStores = data.stores || [];
      renderStores();
    } catch (err) {
      console.error(err);
      document.getElementById('storesGrid').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Error cargando negocios</div>
          <div class="state-sub">Intenta recargar la página</div>
        </div>`;
    }
  }

  function renderStores() {
    let stores = allStores;
    if (activeType) stores = stores.filter(s => (s.businessType || '').toLowerCase() === activeType);
    if (searchQuery) {
      stores = stores.filter(s => {
        const hay = [s.name, s.businessType, s.city, s.state, s.description].join(' ').toLowerCase();
        return hay.includes(searchQuery);
      });
    }

    document.getElementById('storeCount').textContent = `${stores.length} negocio${stores.length !== 1 ? 's' : ''}`;

    if (stores.length === 0) {
      document.getElementById('storesGrid').innerHTML = `
        <div class="state-box">
          <div class="state-icon">🔍</div>
          <div class="state-title">No encontramos negocios</div>
          <div class="state-sub">Prueba con otra búsqueda o categoría</div>
        </div>`;
      return;
    }

    document.getElementById('storesGrid').innerHTML = stores.map((s, i) => {
      const emoji = EMOJIS[s.businessType?.toLowerCase()] || EMOJIS.default;
      const imgHTML = s.coverImage
        ? `<img src="${s.coverImage}" alt="${s.name}" loading="lazy" />`
        : `<div class="card-image-placeholder">${emoji}</div>`;
      const city = [s.city, s.state].filter(Boolean).join(', ');
      const payments = [
        s.hasStripe ? '<span class="pay-chip stripe">Tarjeta</span>' : '',
        s.hasSPEI   ? '<span class="pay-chip spei">SPEI</span>'    : '',
      ].filter(Boolean).join('');

      return `
        <a class="store-card" href="/takeapp/${s.id}" style="animation-delay:${i * 0.04}s">
          <div class="card-image">
            ${imgHTML}
            ${s.businessType ? `<span class="card-type-badge">${s.businessType}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-name">${s.name}</div>
            ${city ? `<div class="card-location">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 22s-8-5-8-12a8 8 0 0 1 16 0c0 7-8 12-8 12z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              ${city}
            </div>` : ''}
            ${s.description ? `<div class="card-desc">${s.description}</div>` : ''}
            <div class="card-footer">
              <span class="card-meta">${s.servicesCount} producto${s.servicesCount !== 1 ? 's' : ''}</span>
              <div class="card-payments">${payments}</div>
            </div>
          </div>
        </a>`;
    }).join('');
  }
</script>
</body>
</html>
