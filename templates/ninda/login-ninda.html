{{define "ninda/login-ninda.html"}}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Ninda</title>
  <link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C62828; --red2: #7B1E2B;
      --ink: #0f0f0f; --muted: #6b7280;
      --border: #e5e7eb; --bg: #f9fafb;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

    .top { height: 52px; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1.5rem; gap: .5rem; }
    .top-logo { font-size: 1.1rem; font-weight: 800; color: var(--ink); text-decoration: none; }
    .top-logo span { color: var(--red); }
    .top-beta { background: var(--red); color: #fff; font-size: .58rem; font-weight: 700; padding: 1px 5px; border-radius: 4px; text-transform: uppercase; }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .card {
      background: #fff; border: 1px solid var(--border);
      border-radius: 20px; padding: 2.25rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }

    .card-title { font-size: 1.4rem; font-weight: 800; margin-bottom: .35rem; }
    .card-sub   { font-size: .88rem; color: var(--muted); margin-bottom: 1.75rem; }

    /* Tab switcher (comprador / repartidor) */
    .role-tabs { display: flex; background: #f3f4f6; border-radius: 10px; padding: 3px; margin-bottom: 1.5rem; }
    .role-tab {
      flex: 1; padding: .5rem; border: none; border-radius: 8px;
      font-size: .84rem; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--muted); font-family: var(--font);
      transition: all .2s; display: flex; align-items: center; justify-content: center; gap: .35rem;
    }
    .role-tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    .field { display: flex; flex-direction: column; gap: .3rem; margin-bottom: .85rem; }
    .field label { font-size: .78rem; font-weight: 600; color: #374151; }
    .field-row { position: relative; }
    .field input {
      width: 100%; padding: .65rem .85rem; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: .875rem; font-family: var(--font);
      color: var(--ink); outline: none; transition: border-color .2s;
    }
    .field input:focus { border-color: var(--red); }
    .toggle-pass {
      position: absolute; right: .75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted); font-size: .9rem;
    }

    .forgot { text-align: right; margin-top: -.4rem; margin-bottom: .85rem; }
    .forgot a { font-size: .78rem; color: var(--red); text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }

    .btn-login {
      width: 100%; padding: .75rem; background: var(--red); color: #fff;
      border: none; border-radius: 10px; font-size: .92rem; font-weight: 700;
      cursor: pointer; font-family: var(--font); transition: background .2s;
      display: flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .btn-login:hover { background: var(--red2); }

    .divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--muted); font-size: .8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .btn-attomos {
      width: 100%; padding: .7rem; background: #fff;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      font-family: var(--font); color: var(--ink); transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-attomos:hover { border-color: #1d4ed8; color: #1d4ed8; background: #eff6ff; }

    .register-link { text-align: center; margin-top: 1.25rem; font-size: .83rem; color: var(--muted); }
    .register-link a { color: var(--red); font-weight: 600; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }

    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
      padding: .65rem .85rem; font-size: .82rem; color: #dc2626;
      margin-bottom: 1rem; display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="top">
  <a href="/ninda" class="top-logo">Nin<span>da</span></a>
  <span class="top-beta">Beta</span>
</div>

<div class="page">
  <div class="card">
    <div class="card-title">Bienvenido de nuevo</div>
    <div class="card-sub">Inicia sesión en tu cuenta de Ninda.</div>

    <!-- Tabs comprador / repartidor -->
    <div class="role-tabs">
      <button class="role-tab active" id="tabBuyer"  onclick="setRole('buyer')"><i class="lni lni-shopping-basket"></i> Comprador</button>
      <button class="role-tab"        id="tabDriver" onclick="setRole('driver')"><i class="lni lni-delivery"></i> Repartidor</button>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="lni lni-warning"></i> <span id="errorTxt">Credenciales incorrectas</span>
    </div>

    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="loginEmail" placeholder="tu@correo.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <div class="field-row">
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pass" onclick="togglePass()" id="togglePassBtn" type="button">
          <i class="lni lni-eye" id="passEyeIc"></i>
        </button>
      </div>
    </div>

    <div class="forgot"><a href="/ninda/forgot">¿Olvidaste tu contraseña?</a></div>

    <button class="btn-login" onclick="doLogin()">
      <i class="lni lni-enter"></i> Iniciar sesión
    </button>

    <div class="divider">o continúa con</div>

    <button class="btn-attomos" onclick="loginWithAttomos()">
      <svg width="18" height="18" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#06b6d4"/>
        <path d="M10 28V14l6 9 6-9v14M28 14v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Iniciar sesión con Attomos
    </button>

    <div class="register-link">¿No tienes cuenta? <a href="/ninda/register">Regístrate gratis</a></div>
  </div>
</div>

<script>
let currentRole = 'buyer';

function setRole(role) {
  currentRole = role;
  document.getElementById('tabBuyer').classList.toggle('active',  role === 'buyer');
  document.getElementById('tabDriver').classList.toggle('active', role === 'driver');
}

function togglePass() {
  const inp = document.getElementById('loginPass');
  const ic  = document.getElementById('passEyeIc');
  if (inp.type === 'password') {
    inp.type = 'text';
    ic.className = 'lni lni-eye-slash';
  } else {
    inp.type = 'password';
    ic.className = 'lni lni-eye';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  document.getElementById('errorTxt').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;

  if (!email || !pass) { showError('Completa todos los campos.'); return; }
  if (!email.includes('@')) { showError('Ingresa un correo válido.'); return; }

  // Demo: guardar sesión en localStorage y redirigir
  // En producción aquí va el fetch a /api/ninda/login
  localStorage.setItem('nindaUser', JSON.stringify({
    name: email.split('@')[0],
    email,
    role: currentRole,
  }));
  window.location.href = '/ninda';
}

function loginWithAttomos() {
  // En producción: OAuth flow con Attomos
  // Por ahora redirige al login de Attomos con return_url
  window.location.href = '/login?return_url=/ninda&source=ninda';
}

// Enter en password
document.getElementById('loginPass')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
{{end}}
