{{define "ninda/navbar-ninda.html"}}
<link rel="stylesheet" href="/static/css/ninda/navbar-ninda.css">

<nav class="ninda-nav" id="nindaNav">
  <div class="ninda-nav-container">

    <!-- Logo -->
    <a href="/ninda" class="ninda-logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#C62828"/>
        <path d="M10 28V14l6 9 6-9v14M28 14v14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="28" cy="28" r="3" fill="#fff"/>
      </svg>
      <span class="ninda-logo-text">Ninda</span>
      <span class="ninda-beta">Beta</span>
    </a>

    <!-- Links centro -->
    <ul class="ninda-nav-links" id="nindaNavLinks">
      <li><a href="/ninda" class="ninda-link">Directorio</a></li>
      <li><a href="/ninda/map" class="ninda-link">Rastreo</a></li>
      <li><a href="/" class="ninda-link ninda-link-muted">Attomos</a></li>
    </ul>

    <!-- Auth -->
    <div class="ninda-nav-auth" id="nindaNavAuth">
      <!-- GUEST (default) -->
      <div id="nindaGuest" class="ninda-guest-btns">
        <a href="/ninda/login" class="ninda-btn-ghost">Iniciar sesión</a>
        <a href="/ninda/register" class="ninda-btn-primary">Registrarse</a>
      </div>
      <!-- USER (se muestra si hay sesión) -->
      <div id="nindaUser" class="ninda-user-area" style="display:none">
        <div class="ninda-avatar-wrap" id="nindaAvatarWrap">
          <div class="ninda-avatar" id="nindaAvatar">
            <span id="nindaInitials">?</span>
          </div>
          <div class="ninda-user-dropdown" id="nindaDropdown">
            <div class="nd-header">
              <div class="nd-name" id="ndName">—</div>
              <div class="nd-role" id="ndRole">—</div>
            </div>
            <div class="nd-divider"></div>
            <a href="/ninda/profile" class="nd-item"><i class="lni lni-user"></i> Mi perfil</a>
            <a href="/ninda/orders"  class="nd-item"><i class="lni lni-package"></i> Mis pedidos</a>
            <div class="nd-divider"></div>
            <button class="nd-item nd-logout" id="nindaLogoutBtn">
              <i class="lni lni-exit"></i> Cerrar sesión
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Hamburger móvil -->
    <button class="ninda-hamburger" id="nindaHamburger" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>

  </div>
</nav>

<!-- CSS inline para no depender de archivo externo en dev -->
<style>
  .ninda-nav {
    position: sticky; top: 0; z-index: 500;
    background: rgba(255,255,255,.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #e5e7eb;
    height: 58px;
  }
  .ninda-nav-container {
    max-width: 1280px; margin: 0 auto;
    padding: 0 1.5rem; height: 100%;
    display: flex; align-items: center; gap: 2rem;
  }

  /* Logo */
  .ninda-logo {
    display: flex; align-items: center; gap: .5rem;
    text-decoration: none; flex-shrink: 0;
  }
  .ninda-logo-text {
    font-size: 1.2rem; font-weight: 800; color: #0f0f0f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .ninda-beta {
    background: #C62828; color: #fff; font-size: .58rem; font-weight: 700;
    padding: 1px 5px; border-radius: 4px; text-transform: uppercase;
    letter-spacing: .05em; align-self: flex-start; margin-top: 2px;
  }

  /* Links */
  .ninda-nav-links {
    display: flex; gap: .25rem; list-style: none; flex: 1; justify-content: center;
  }
  .ninda-link {
    padding: .4rem .85rem; border-radius: 8px; text-decoration: none;
    font-size: .875rem; font-weight: 500; color: #374151;
    transition: all .15s;
  }
  .ninda-link:hover { background: #f3f4f6; color: #0f0f0f; }
  .ninda-link-muted { color: #9ca3af; font-size: .82rem; }
  .ninda-link-muted:hover { color: #6b7280; }

  /* Auth */
  .ninda-nav-auth { flex-shrink: 0; }
  .ninda-guest-btns { display: flex; align-items: center; gap: .6rem; }
  .ninda-btn-ghost {
    padding: .42rem 1rem; border-radius: 8px; text-decoration: none;
    font-size: .85rem; font-weight: 600; color: #374151;
    border: 1.5px solid #e5e7eb; transition: all .2s;
  }
  .ninda-btn-ghost:hover { border-color: #C62828; color: #C62828; }
  .ninda-btn-primary {
    padding: .42rem 1rem; border-radius: 8px; text-decoration: none;
    font-size: .85rem; font-weight: 700; color: #fff;
    background: #C62828; transition: background .2s;
  }
  .ninda-btn-primary:hover { background: #7B1E2B; }

  /* Avatar dropdown */
  .ninda-user-area { position: relative; }
  .ninda-avatar-wrap { position: relative; }
  .ninda-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: #C62828; color: #fff; font-weight: 700; font-size: .85rem;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: box-shadow .2s;
  }
  .ninda-avatar:hover { box-shadow: 0 0 0 3px rgba(198,40,40,.2); }
  .ninda-user-dropdown {
    position: absolute; top: calc(100% + 10px); right: 0;
    background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.1); min-width: 200px;
    display: none; z-index: 1000; overflow: hidden;
  }
  .ninda-avatar-wrap:hover .ninda-user-dropdown,
  .ninda-avatar-wrap.open .ninda-user-dropdown { display: block; }
  .nd-header { padding: .85rem 1rem; }
  .nd-name  { font-size: .9rem; font-weight: 700; color: #0f0f0f; }
  .nd-role  { font-size: .75rem; color: #9ca3af; }
  .nd-divider { height: 1px; background: #f3f4f6; }
  .nd-item {
    display: flex; align-items: center; gap: .6rem;
    padding: .65rem 1rem; font-size: .85rem; color: #374151;
    text-decoration: none; transition: background .12s; width: 100%;
    background: none; border: none; cursor: pointer; font-family: inherit;
    text-align: left;
  }
  .nd-item:hover { background: #f9fafb; }
  .nd-logout { color: #C62828; }
  .nd-logout:hover { background: #fef2f2; }

  /* Hamburger */
  .ninda-hamburger {
    display: none; flex-direction: column; gap: 5px;
    background: none; border: none; cursor: pointer; padding: 4px; margin-left: auto;
  }
  .ninda-hamburger span {
    display: block; width: 22px; height: 2px; background: #374151;
    border-radius: 2px; transition: all .25s;
  }
  .ninda-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .ninda-hamburger.open span:nth-child(2) { opacity: 0; }
  .ninda-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  @media (max-width: 700px) {
    .ninda-nav-links { display: none; position: absolute; top: 58px; left: 0; right: 0; flex-direction: column; background: #fff; border-bottom: 1px solid #e5e7eb; padding: .75rem; gap: .25rem; }
    .ninda-nav-links.open { display: flex; }
    .ninda-hamburger { display: flex; }
    .ninda-guest-btns .ninda-btn-ghost { display: none; }
  }
</style>

<script>
(function() {
  // Toggle hamburger
  const ham = document.getElementById('nindaHamburger');
  const links = document.getElementById('nindaNavLinks');
  if (ham) ham.addEventListener('click', () => {
    ham.classList.toggle('open');
    links.classList.toggle('open');
  });

  // Avatar dropdown toggle
  const wrap = document.getElementById('nindaAvatarWrap');
  if (wrap) {
    wrap.addEventListener('click', () => wrap.classList.toggle('open'));
    document.addEventListener('click', e => {
      if (!wrap.contains(e.target)) wrap.classList.remove('open');
    });
  }

  // Cargar sesión de Ninda desde localStorage
  try {
    const session = JSON.parse(localStorage.getItem('nindaUser') || 'null');
    if (session) {
      document.getElementById('nindaGuest').style.display = 'none';
      document.getElementById('nindaUser').style.display  = 'block';
      document.getElementById('ndName').textContent    = session.name || session.email;
      document.getElementById('ndRole').textContent    = session.role === 'driver' ? '🛵 Repartidor' : '🛍️ Comprador';
      const initials = (session.name || session.email || '?').charAt(0).toUpperCase();
      document.getElementById('nindaInitials').textContent = initials;
    }
  } catch(e) {}

  // Logout
  const logoutBtn = document.getElementById('nindaLogoutBtn');
  if (logoutBtn) logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('nindaUser');
    window.location.href = '/ninda';
  });
})();
</script>
{{end}}
