<!-- Sidebar Styles -->
<link rel="stylesheet" href="/static/css/sidebar.css">

<!-- Mobile Menu Button -->
<button class="mobile-menu-btn" id="mobileMenuBtn">
    <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</button>

<!-- Mobile Overlay -->
<div class="mobile-overlay" id="mobileOverlay"></div>

<!-- Sidebar -->
<div class="sidebar sidebar-border collapsed" id="sidebar">
    <div class="sidebar-header">

            <img src="/static/images/attomos-logo.png" alt="Attomos Logo" class="logo-icon">
            <span class="brand-text">Attomos</span>
        </a>
        <button class="pin-btn" id="pinBtn" title="Fijar sidebar">

                <line x1="12" x2="12" y1="17" y2="22"/>

            </svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <ul class="menu-list">
            <li class="menu-item">
                <a href="/dashboard" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <span class="text-label">Dashboard</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/profile" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <span class="text-label">Mi Perfil</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/dashboard#agents" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                    </div>
                    <span class="text-label">Mis Agentes</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/appointments" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    </div>
                    <span class="text-label">Mis Citas</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/messages" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <span class="text-label">Mensajes</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/plans" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <span class="text-label">Planes</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/billing" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    </div>
                    <span class="text-label">Facturación</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/settings" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                    <span class="text-label">Configuración</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <button class="menu-button logout-button" id="logoutBtn">
            <div class="icon-wrapper">
                <svg class="lucide" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </div>
            <span class="text-label">Cerrar Sesión</span>
        </button>
    </div>
</div>

<script>
    // Sidebar hover functionality
    const sidebar = document.getElementById('sidebar');
    const pinBtn = document.getElementById('pinBtn');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileOverlay = document.getElementById('mobileOverlay');
    let isPinned = false;
    let isMobile = window.innerWidth <= 768;

    // Check if sidebar was pinned in localStorage
    if (localStorage.getItem('sidebarPinned') === 'true' && !isMobile) {
        isPinned = true;
        sidebar.classList.add('pinned');
        sidebar.classList.add('expanded');
        sidebar.classList.remove('collapsed');
        pinBtn.classList.add('active');
    }

    // Pin button functionality (desktop only)
    pinBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isMobile) return;
        
        isPinned = !isPinned;
        
        if (isPinned) {
            sidebar.classList.add('pinned');
            sidebar.classList.add('expanded');
            sidebar.classList.remove('collapsed');
            pinBtn.classList.add('active');
            localStorage.setItem('sidebarPinned', 'true');
        } else {
            sidebar.classList.remove('pinned');
            pinBtn.classList.remove('active');
            localStorage.setItem('sidebarPinned', 'false');
        }
    });

    // Hover functionality (only works when not pinned and not mobile)
    sidebar.addEventListener('mouseenter', () => {
        if (!isPinned && !isMobile) {
            sidebar.classList.remove('collapsed');
            sidebar.classList.add('expanded');
        }
    });

    sidebar.addEventListener('mouseleave', () => {
        if (!isPinned && !isMobile) {
            sidebar.classList.remove('expanded');
            sidebar.classList.add('collapsed');
        }
    });

    // Mobile menu functionality
    mobileMenuBtn.addEventListener('click', () => {
        const isActive = sidebar.classList.contains('mobile-active');
        
        if (isActive) {
            closeMobileSidebar();
        } else {
            openMobileSidebar();
        }
    });

    // Overlay click to close
    mobileOverlay.addEventListener('click', () => {
        closeMobileSidebar();
    });

    function openMobileSidebar() {
        sidebar.classList.add('mobile-active');
        mobileOverlay.classList.add('active');
        mobileMenuBtn.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeMobileSidebar() {
        sidebar.classList.remove('mobile-active');
        mobileOverlay.classList.remove('active');
        mobileMenuBtn.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Close mobile sidebar when clicking on a link
    const menuLinks = sidebar.querySelectorAll('.menu-button');
    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (isMobile) {
                closeMobileSidebar();
            }
        });
    });

    // Handle window resize
    window.addEventListener('resize', () => {
        const wasMobile = isMobile;
        isMobile = window.innerWidth <= 768;
        
        // Transitioning from mobile to desktop
        if (wasMobile && !isMobile) {
            closeMobileSidebar();
            
            // Restore pinned state if it was set
            if (localStorage.getItem('sidebarPinned') === 'true') {
                isPinned = true;
                sidebar.classList.add('pinned', 'expanded');
                sidebar.classList.remove('collapsed');
                pinBtn.classList.add('active');
            }
        }
        
        // Transitioning from desktop to mobile
        if (!wasMobile && isMobile) {
            sidebar.classList.remove('pinned', 'expanded');
            sidebar.classList.add('collapsed');
            pinBtn.classList.remove('active');
            isPinned = false;
        }
    });

    // Logout functionality
    const logoutBtn = document.getElementById('logoutBtn');
    logoutBtn.addEventListener('click', async () => {
        try {
            const response = await fetch('/api/logout', {
                method: 'POST',
                credentials: 'include'
            });

            if (response.ok) {
                // Limpiar localStorage
                localStorage.removeItem('sidebarPinned');
                
                // Redirigir al login
                window.location.href = '/login';
            } else {
                console.error('Error al cerrar sesión');
                alert('Error al cerrar sesión. Por favor intenta de nuevo.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al cerrar sesión. Por favor intenta de nuevo.');
        }
    });
</script>
