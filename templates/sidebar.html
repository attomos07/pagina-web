<link rel="stylesheet" href="/static/css/sidebar.css">

<!-- Mobile Menu Button -->

    <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
</button>

<!-- Mobile Overlay -->
<div class="mobile-overlay" id="mobileOverlay"></div>

<!-- Sidebar -->
<div class="sidebar sidebar-border collapsed" id="sidebar">

            <img src="/static/images/attomos-logo.png" alt="Attomos Logo" class="logo-icon">
            <span class="brand-text">Attomos</span>

        <button class="pin-btn" id="pinBtn" title="Fijar sidebar">

            </svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <ul class="menu-list">
            <li class="menu-item">
                <a href="/dashboard" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    </div>
                    <span class="text-label">Dashboard</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/profile" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <span class="text-label">Mi Perfil</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/my-agents" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                    </div>
                    <span class="text-label">Mis Agentes</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/appointments" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    </div>
                    <span class="text-label">Mis Citas</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/integrations" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    </div>
                    <span class="text-label">Integraciones</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="#" id="messagesLink" class="menu-button" data-loading="true">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <span class="text-label">
                        <span class="messages-text">Mensajes</span>
                        <span class="messages-loading" style="display: none;">
                            <span class="loading-dots">...</span>
                        </span>
                    </span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/plans" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <span class="text-label">Planes</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/billing" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
                    </div>
                    <span class="text-label">Facturación</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="/settings" class="menu-button">
                    <div class="icon-wrapper">
                        <svg class="lucide" viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                    <span class="text-label">Configuración</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <button class="menu-button logout-button" id="logoutBtn">
            <div class="icon-wrapper">
                <svg class="lucide" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
            </div>
            <span class="text-label">Cerrar Sesión</span>
        </button>
    </div>
</div>

<style>
    /* Loading dots animation */
    .loading-dots {
        display: inline-block;
        animation: loadingDots 1.5s infinite;
    }

    @keyframes loadingDots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60%, 100% { content: '...'; }
    }

    /* Disabled state for messages link */
    #messagesLink[data-loading="true"] {
        opacity: 0.6;
        cursor: wait;
    }

    #messagesLink[data-disabled="true"] {
        opacity: 0.5;
        cursor: not-allowed;
    }

    #messagesLink[data-disabled="true"]:hover {
        background: transparent;
    }

    #messagesLink[data-disabled="true"]:hover::before {
        width: 0;
        height: 0;
    }
</style>

<script>
    // Sidebar hover functionality
    const sidebar = document.getElementById('sidebar');
    const pinBtn = document.getElementById('pinBtn');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const messagesLink = document.getElementById('messagesLink');
    const messagesText = messagesLink.querySelector('.messages-text');
    const messagesLoading = messagesLink.querySelector('.messages-loading');
    
    let isPinned = false;
    let isMobile = window.innerWidth <= 768;

    // Check if sidebar was pinned in localStorage
    if (localStorage.getItem('sidebarPinned') === 'true' && !isMobile) {
        isPinned = true;
        sidebar.classList.add('pinned');
        sidebar.classList.add('expanded');
        sidebar.classList.remove('collapsed');
        pinBtn.classList.add('active');
    }

    // Load Chatwoot info on page load
    async function loadChatwootInfo() {
        try {
            messagesLink.setAttribute('data-loading', 'true');
            messagesText.style.display = 'none';
            messagesLoading.style.display = 'inline';

            const response = await fetch('/api/chatwoot/info', {
                method: 'GET',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error('Error al cargar información de Chatwoot');
            }

            const data = await response.json();

            // Restore text
            messagesText.style.display = 'inline';
            messagesLoading.style.display = 'none';
            messagesLink.removeAttribute('data-loading');

            if (data.hasChatwoot && data.chatwootUrl) {
                // Chatwoot está disponible - actualizar el enlace
                messagesLink.href = data.chatwootUrl;
                messagesLink.target = '_blank';
                messagesLink.rel = 'noopener noreferrer';
                messagesLink.removeAttribute('data-disabled');
                
                // Agregar indicador visual de que es un enlace externo
                const iconWrapper = messagesLink.querySelector('.icon-wrapper');
                iconWrapper.innerHTML = `
                    <svg class="lucide" viewBox="0 0 24 24" style="color: #10b981;">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        <circle cx="17" cy="8" r="2" fill="currentColor"/>
                    </svg>
                `;
                
                console.log('✅ Chatwoot disponible:', data.chatwootUrl);
            } else {
                // Chatwoot no está disponible - deshabilitar enlace
                messagesLink.href = '#';
                messagesLink.removeAttribute('target');
                messagesLink.removeAttribute('rel');
                messagesLink.setAttribute('data-disabled', 'true');
                
                // Agregar event listener para mostrar mensaje
                messagesLink.addEventListener('click', (e) => {
                    if (messagesLink.getAttribute('data-disabled') === 'true') {
                        e.preventDefault();
                        showChatwootNotAvailableMessage();
                    }
                });

                console.log('ℹ️ Chatwoot no disponible aún');
            }
        } catch (error) {
            console.error('Error cargando información de Chatwoot:', error);
            
            // En caso de error, deshabilitar el enlace
            messagesText.style.display = 'inline';
            messagesLoading.style.display = 'none';
            messagesLink.removeAttribute('data-loading');
            messagesLink.href = '#';
            messagesLink.setAttribute('data-disabled', 'true');
            
            messagesLink.addEventListener('click', (e) => {
                if (messagesLink.getAttribute('data-disabled') === 'true') {
                    e.preventDefault();
                    showChatwootNotAvailableMessage();
                }
            });
        }
    }

    // Show message when Chatwoot is not available
    function showChatwootNotAvailableMessage() {
        // Crear un toast notification simple
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed;
            top: 24px;
            right: 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            max-width: 400px;
        `;
        
        toast.innerHTML = `
            <div style="display: flex; align-items: center; gap: 12px;">
                <svg style="width: 24px; height: 24px; flex-shrink: 0;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="16" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12.01" y2="8"/>
                </svg>
                <div>
                    <div style="font-weight: 600; margin-bottom: 4px;">Chatwoot no disponible</div>
                    <div style="font-size: 14px; opacity: 0.9;">Crea tu primer agente para activar el panel de mensajes</div>
                </div>
            </div>
        `;

        // Add animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(400px);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(400px);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);

        document.body.appendChild(toast);

        // Auto remove after 4 seconds
        setTimeout(() => {
            toast.style.animation = 'slideOut 0.3s ease-in';
            setTimeout(() => {
                document.body.removeChild(toast);
                document.head.removeChild(style);
            }, 300);
        }, 4000);
    }

    // Load Chatwoot info on page load
    loadChatwootInfo();

    // Pin button functionality (desktop only)
    pinBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isMobile) return;
        
        isPinned = !isPinned;
        
        if (isPinned) {
            sidebar.classList.add('pinned');
            sidebar.classList.add('expanded');
            sidebar.classList.remove('collapsed');
            pinBtn.classList.add('active');
            localStorage.setItem('sidebarPinned', 'true');
        } else {
            sidebar.classList.remove('pinned');
            pinBtn.classList.remove('active');
            localStorage.setItem('sidebarPinned', 'false');
        }
    });

    // Hover functionality (only works when not pinned and not mobile)
    sidebar.addEventListener('mouseenter', () => {
        if (!isPinned && !isMobile) {
            sidebar.classList.remove('collapsed');
            sidebar.classList.add('expanded');
        }
    });

    sidebar.addEventListener('mouseleave', () => {
        if (!isPinned && !isMobile) {
            sidebar.classList.remove('expanded');
            sidebar.classList.add('collapsed');
        }
    });

    // Mobile menu functionality
    mobileMenuBtn.addEventListener('click', () => {
        const isActive = sidebar.classList.contains('mobile-active');
        
        if (isActive) {
            closeMobileSidebar();
        } else {
            openMobileSidebar();
        }
    });

    // Overlay click to close
    mobileOverlay.addEventListener('click', () => {
        closeMobileSidebar();
    });

    function openMobileSidebar() {
        sidebar.classList.add('mobile-active');
        mobileOverlay.classList.add('active');
        mobileMenuBtn.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeMobileSidebar() {
        sidebar.classList.remove('mobile-active');
        mobileOverlay.classList.remove('active');
        mobileMenuBtn.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Close mobile sidebar when clicking on a link (except disabled messages link)
    const menuLinks = sidebar.querySelectorAll('.menu-button');
    menuLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            if (isMobile && link.getAttribute('data-disabled') !== 'true') {
                closeMobileSidebar();
            }
        });
    });

    // Handle window resize
    window.addEventListener('resize', () => {
        const wasMobile = isMobile;
        isMobile = window.innerWidth <= 768;
        
        // Transitioning from mobile to desktop
        if (wasMobile && !isMobile) {
            closeMobileSidebar();
            
            // Restore pinned state if it was set
            if (localStorage.getItem('sidebarPinned') === 'true') {
                isPinned = true;
                sidebar.classList.add('pinned', 'expanded');
                sidebar.classList.remove('collapsed');
                pinBtn.classList.add('active');
            }
        }
        
        // Transitioning from desktop to mobile
        if (!wasMobile && isMobile) {
            sidebar.classList.remove('pinned', 'expanded');
            sidebar.classList.add('collapsed');
            pinBtn.classList.remove('active');
            isPinned = false;
        }
    });

    // Logout functionality
    const logoutBtn = document.getElementById('logoutBtn');
    logoutBtn.addEventListener('click', async () => {
        try {
            const response = await fetch('/api/logout', {
                method: 'POST',
                credentials: 'include'
            });

            if (response.ok) {
                // Limpiar localStorage
                localStorage.removeItem('sidebarPinned');
                
                // Redirigir al login
                window.location.href = '/login';
            } else {
                console.error('Error al cerrar sesión');
                alert('Error al cerrar sesión. Por favor intenta de nuevo.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al cerrar sesión. Por favor intenta de nuevo.');
        }
    });
</script>
